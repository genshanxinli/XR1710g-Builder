name: Build XR1710G Firmware (Matrix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Build toolchain once for all profiles ──
  toolchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout offload base
        uses: actions/checkout@v4
        with:
          repository: OpenWRT-fanboy/OpenW1700k
          ref: offload
          persist-credentials: false
      - name: Checkout builder configs (XR1710g-Builder)
        uses: actions/checkout@v4
        with:
          path: builder-configs
          persist-credentials: false

      - name: Setup build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget cpio bc ccache libelf-dev quilt

      - name: Cache dl (source tarballs)
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ hashFiles('feeds.conf.default', 'builder-configs/configs/lean.config') }}
          restore-keys: dl-

      - name: Cache ccache (shared across profiles)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-
            ccache-

      - name: Apply overclock (+200MHz) and performance governor
        run: |
          set -ex
          sed -i \
            -e 's/CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y/# CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND is not set/' \
            -e 's/# CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE is not set/CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y/' \
            target/linux/airoha/an7581/config-6.18
          sed -i '/opp-500000000 {/,/};/s/<500000000>/<700000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-550000000 {/,/};/s/<550000000>/<750000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-600000000 {/,/};/s/<600000000>/<800000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-650000000 {/,/};/s/<650000000>/<850000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7000000000 {/,/};/s/<700000000>/<900000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7500000000 {/,/};/s/<750000000>/<950000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8000000000 {/,/};/s/<800000000>/<1000000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8500000000 {/,/};/s/<850000000>/<1050000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9000000000 {/,/};/s/<900000000>/<1100000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9500000000 {/,/};/s/<950000000>/<1150000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10000000000 {/,/};/s/<1000000000>/<1200000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10500000000 {/,/};/s/<1050000000>/<1250000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11000000000 {/,/};/s/<1100000000>/<1300000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11500000000 {/,/};/s/<1150000000>/<1350000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-12000000000 {/,/};/s/<1200000000>/<1400000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-12000000000 {/opp-14000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11500000000 {/opp-13500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11000000000 {/opp-13000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10500000000 {/opp-12500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10000000000 {/opp-12000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9500000000 {/opp-11500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9000000000 {/opp-11000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8500000000 {/opp-10500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8000000000 {/opp-10000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7500000000 {/opp-9500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7000000000 {/opp-9000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-650000000 {/opp-850000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-600000000 {/opp-800000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-550000000 {/opp-750000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-500000000 {/opp-700000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/unsigned int freq_mhz = 500 + state \* 50;/unsigned int freq_mhz = 700 + state * 50;/' \
            target/linux/airoha/patches-6.18/940-pmdomain-airoha-Add-Airoha-CPU-PM-Domain-support.patch
          echo "Overclock +200MHz applied"

      - name: Apply YYH2913 XR1710G patches and DTS
        run: |
          set -ex
          YYH_RAW="https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/patches-6.18"
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-01-net-pcs-airoha-fix-USXGMII-rate-adaptation-on-speed.patch \
            $YYH_RAW/620-net-pcs-airoha-fix-USXGMII-rate-adaptation-on-speed.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-02-net-pcs-airoha-AN7581-add-global-digital-reset-for.patch \
            $YYH_RAW/621-net-pcs-airoha-AN7581-add-global-digital-reset-for.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-03-net-airoha-npu-fix-firmware-loading-issue.patch \
            $YYH_RAW/921-net-airoha-npu-fix-firmware-loading-issue.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-04-net-airoha-classify-external-lan-ports-from-DT.patch \
            $YYH_RAW/922-net-airoha-classify-external-lan-ports-from-DT.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/dts/an7581-xr1710g-ubi.dts \
            https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/dts/an7581-xr1710g-ubi.dts
          curl -sSL --retry 3 --retry-delay 5 -o package/firmware/linux-firmware/airoha.mk \
            https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/package/firmware/linux-firmware/airoha.mk

      - name: Enable bridge flow table kernel config
        run: |
          echo "CONFIG_NF_FLOW_TABLE_BRIDGE=m" >> target/linux/airoha/an7581/config-6.18

      - name: Add XR1710G device definition (YYH2913 authoritative)
        run: |
          cat >> target/linux/airoha/image/an7581.mk << 'XR1710GDEV'

          define Device/econet_xr1710g-ubi
            DEVICE_VENDOR := Econet
            DEVICE_MODEL := XR1710G
            DEVICE_VARIANT := UBI
            DEVICE_DTS := an7581-xr1710g-ubi
            DEVICE_COMPAT_VERSION := 2.0
            DEVICE_COMPAT_MESSAGE := The XR1710G BMT/BBT boundary has changed. Install \
                 an XR1710G chainloader/U-Boot using the new layout first, then boot \
                 recovery/initramfs and fully recreate UBI. A normal sysupgrade that \
                 preserves configuration is unsafe.
            DEVICE_PACKAGES := -airoha-en7581-npu-firmware \
                  -kmod-input-gpio-keys-polled -kmod-leds-pwm \
                  -kmod-pwm-airoha \
                  airoha-en7581-mt7996-npu-firmware \
                  apk-mbedtls ethtool-full fitblk \
                  kmod-i2c-an7581 kmod-hwmon-nct7802 \
                  kmod-mt7996-firmware kmod-phy-realtek rtl826x-firmware \
                  kmod-nf-flow-bridge kmod-nft-offload kmod-nft-fullcone \
                  kmod-nf-flowoffload kmod-nf-flowoffload4 kmod-nf-flowoffload6 \
                  luci \
                  luci-app-firewall luci-app-mlo \
                  luci-app-package-manager \
                  luci-i18n-mlo-zh-cn \
                  luci-mod-admin-full \
                  luci-proto-ppp luci-theme-bootstrap \
                  rpcd-mod-rrdns uhttpd uhttpd-mod-ubus \
                  wpad-basic-mbedtls
            UBINIZE_OPTS := -E 5
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            UBOOTENV_IN_UBI := 1
            KERNEL_IN_UBI := 1
            KERNEL := kernel-bin | gzip
            KERNEL_INITRAMFS := kernel-bin | lzma | \
              fit lzma $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb with-initrd | pad-to 128k
            KERNEL_INITRAMFS_SUFFIX := -recovery.itb
            IMAGES := sysupgrade.itb
            IMAGE/sysupgrade.itb := append-kernel | fit gzip $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb external-static-with-rootfs | append-metadata
            SOC := an7581
          endef
          TARGET_DEVICES += econet_xr1710g-ubi
          XR1710GDEV

      - name: Patch platform.sh for econet,xr1710g-ubi upgrade
        run: |
          awk '
          /^\t\t\*\)/ && !done {
            print "\t\teconet,xr1710g-ubi)"
            print "\t\t\tfit_do_upgrade \"$1\""
            print "\t\t\t;;"
            done=1
          }
          { print }
          ' target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh > /tmp/platform.sh
          mv /tmp/platform.sh target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh
          echo "platform.sh patched for econet,xr1710g-ubi"
          grep -q 'econet,xr1710g-ubi' \
            target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh || {
            echo "FATAL: platform.sh patch did not apply"
            exit 1
          }
          echo "platform.sh verified: econet,xr1710g-ubi case present"

      - name: Add YYH2913 uci-defaults (flow offload, WiFi tuning, XR1710G WiFi)
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/14-airoha-hw-flow-offload << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          config_load firewall
          config_get flow_offloading defaults flow_offloading
          config_get flow_offloading_hw defaults flow_offloading_hw
          [ -n "$flow_offloading" ] || uci set firewall.@defaults[0].flow_offloading='1'
          [ -n "$flow_offloading_hw" ] || uci set firewall.@defaults[0].flow_offloading_hw='1'
          uci commit firewall
          exit 0
          EOF
          cat > files/etc/uci-defaults/16-airoha-wifi-tuning << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          . /lib/functions/system.sh
          case "$(board_name)" in
            gemtek,w1700k-ubi|econet,xr1710g-ubi) ;;
            *) exit 0 ;;
          esac
          config_load wireless
          changed=0
          tune_wifi_iface() {
            local cfg="$1" mode
            config_get mode "$cfg" mode
            [ "$mode" = "ap" ] || return 0
            if ! uci -q get wireless."$cfg".uapsd >/dev/null; then
              uci set wireless."$cfg".uapsd='0'; changed=1
            fi
            if ! uci -q get wireless."$cfg".disassoc_low_ack >/dev/null; then
              uci set wireless."$cfg".disassoc_low_ack='0'; changed=1
            fi
          }
          config_foreach tune_wifi_iface wifi-iface
          [ "$changed" -eq 1 ] && uci commit wireless
          exit 0
          EOF
          cat > files/etc/uci-defaults/17-xr1710g-wifi-defaults << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          . /lib/functions/system.sh
          [ "$(board_name)" = "econet,xr1710g-ubi" ] || exit 0
          config_load wireless
          changed=0
          set_xr1710g_radio_defaults() {
            local cfg="$1" band
            config_get band "$cfg" band
            case "$band" in
              2g) uci set wireless."$cfg".country='US' ;;
              5g) uci set wireless."$cfg".country='US'
                uci set wireless."$cfg".channel='36'
                uci set wireless."$cfg".htmode='EHT160' ;;
              6g) uci set wireless."$cfg".country='US'
                uci set wireless."$cfg".channel='37'
                uci set wireless."$cfg".htmode='EHT320' ;;
              *) return 0 ;;
            esac
            changed=1
          }
          config_foreach set_xr1710g_radio_defaults wifi-device
          [ "$changed" -eq 1 ] && uci commit wireless
          exit 0
          EOF
          cat > files/etc/uci-defaults/99-ssh-port << 'SSHCONF'
          #!/bin/sh
          uci set dropbear.@dropbear[0].Port=2242
          uci commit dropbear
          rm -f /etc/uci-defaults/99-ssh-port
          exit 0
          SSHCONF
          chmod +x files/etc/uci-defaults/*

      - name: Add YYH2913 hotplug scripts
        run: |
          mkdir -p files/etc/hotplug.d/net
          cat > files/etc/hotplug.d/net/50-flow-offload-wifi << 'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] || exit 0
          case "$INTERFACE" in
            wl*|phy*|radio*) ;;
            *) exit 0 ;;
          esac
          sleep 2
          /etc/init.d/firewall reload 2>/dev/null
          EOF
          cat > files/etc/hotplug.d/net/50-nf-bridge-call << 'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] || exit 0
          case "$INTERFACE" in
            br-*) ;;
            *) exit 0 ;;
          esac
          /etc/init.d/firewall reload 2>/dev/null
          EOF
          chmod +x files/etc/hotplug.d/net/*

      - name: irqbalance config
        run: |
          mkdir -p files/etc/default
          cat > files/etc/default/irqbalance << 'IRQCONF'
          IRQBALANCE_BANNED_CPUS=
          IRQBALANCE_ARGS="--hintpolicy=subset"
          IRQCONF

      - name: Patch board.d scripts for XR1710G
        run: |
          awk '
          /^\tnokia,valyrian)/ && !done {
            print "\teconet,xr1710g-ubi)"
            print "\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\""
            print "\t\tucidef_set_country \"US\""
            print "\t\tucidef_set_wireless \"2g\" \"XR1710G\""
            print "\t\tucidef_set_wireless \"5g\" \"XR1710G-5G\""
            print "\t\tucidef_set_wireless \"6g\" \"XR1710G-6G\""
            print "\t\tucidef_set_root_password_plain \"password\""
            print "\t\t;;"
            done=1
          }
          { print }
          ' target/linux/airoha/an7581/base-files/etc/board.d/02_network > /tmp/02_network
          mv /tmp/02_network target/linux/airoha/an7581/base-files/etc/board.d/02_network
          grep -q 'econet,xr1710g-ubi)' \
            target/linux/airoha/an7581/base-files/etc/board.d/02_network || exit 1
          echo "02_network: XR1710G interfaces added"
          sed -i 's/^\tgemtek,w1700k-ubi)/\tgemtek,w1700k-ubi|econet,xr1710g-ubi)/' \
            target/linux/airoha/an7581/base-files/etc/board.d/05_compat-version
          grep -q 'gemtek,w1700k-ubi|econet,xr1710g-ubi)' \
            target/linux/airoha/an7581/base-files/etc/board.d/05_compat-version || exit 1
          echo "05_compat-version: XR1710G compat version set"

      - name: Configure firmware (lean baseline for toolchain)
        run: |
          cp ${{ github.workspace }}/builder-configs/configs/lean.config .config
          echo "CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y" >> .config
          make defconfig


      - name: Cache built toolchain (for build jobs)
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: |
            staging_dir/toolchain-*
            staging_dir/host*
            build_dir/toolchain-*
            build_dir/host*
          key: tc-${{ hashFiles('toolchain/**', 'include/toolchain*.mk', 'target/linux/airoha/Makefile') }}

      - name: Build toolchain only
        run: make -j$(nproc) toolchain/compile 2>&1

      - name: Report ccache hit rate
        run: ccache -s 2>&1 | tail -10

  # ── Job 2: Build firmware for each profile ──
  build:
    needs: [toolchain]
    strategy:
      fail-fast: false
      matrix:
        profile: [lean, lite, full]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout offload base
        uses: actions/checkout@v4
        with:
          repository: OpenWRT-fanboy/OpenW1700k
          ref: offload
          persist-credentials: false
      - name: Checkout builder configs (XR1710g-Builder)
        uses: actions/checkout@v4
        with:
          path: builder-configs
          persist-credentials: false

      - name: Setup build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget cpio bc ccache libelf-dev quilt

      - name: Cache dl (source tarballs — shared across profiles)
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ hashFiles('feeds.conf.default', 'builder-configs/configs/lean.config') }}
          restore-keys: dl-

      - name: Restore ccache (shared across profiles)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-
            ccache-

      - name: Restore toolchain (built once by toolchain job)
        uses: actions/cache@v4
        with:
          path: |
            staging_dir/toolchain-*
            staging_dir/host*
            build_dir/toolchain-*
            build_dir/host*
          key: tc-${{ hashFiles('toolchain/**', 'include/toolchain*.mk', 'target/linux/airoha/Makefile') }}

      - name: Apply overclock (+200MHz) and performance governor
        run: |
          set -ex
          sed -i \
            -e 's/CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y/# CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND is not set/' \
            -e 's/# CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE is not set/CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y/' \
            target/linux/airoha/an7581/config-6.18
          sed -i '/opp-500000000 {/,/};/s/<500000000>/<700000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-550000000 {/,/};/s/<550000000>/<750000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-600000000 {/,/};/s/<600000000>/<800000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-650000000 {/,/};/s/<650000000>/<850000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7000000000 {/,/};/s/<700000000>/<900000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7500000000 {/,/};/s/<750000000>/<950000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8000000000 {/,/};/s/<800000000>/<1000000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8500000000 {/,/};/s/<850000000>/<1050000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9000000000 {/,/};/s/<900000000>/<1100000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9500000000 {/,/};/s/<950000000>/<1150000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10000000000 {/,/};/s/<1000000000>/<1200000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10500000000 {/,/};/s/<1050000000>/<1250000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11000000000 {/,/};/s/<1100000000>/<1300000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11500000000 {/,/};/s/<1150000000>/<1350000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-12000000000 {/,/};/s/<1200000000>/<1400000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-12000000000 {/opp-14000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11500000000 {/opp-13500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11000000000 {/opp-13000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10500000000 {/opp-12500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10000000000 {/opp-12000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9500000000 {/opp-11500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9000000000 {/opp-11000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8500000000 {/opp-10500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8000000000 {/opp-10000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7500000000 {/opp-9500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7000000000 {/opp-9000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-650000000 {/opp-850000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-600000000 {/opp-800000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-550000000 {/opp-750000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-500000000 {/opp-700000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/unsigned int freq_mhz = 500 + state \* 50;/unsigned int freq_mhz = 700 + state * 50;/' \
            target/linux/airoha/patches-6.18/940-pmdomain-airoha-Add-Airoha-CPU-PM-Domain-support.patch
          echo "Overclock +200MHz applied"

      - name: Apply YYH2913 XR1710G patches and DTS
        run: |
          set -ex
          YYH_RAW="https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/patches-6.18"
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-01-net-pcs-airoha-fix-USXGMII-rate-adaptation-on-speed.patch \
            $YYH_RAW/620-net-pcs-airoha-fix-USXGMII-rate-adaptation-on-speed.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-02-net-pcs-airoha-AN7581-add-global-digital-reset-for.patch \
            $YYH_RAW/621-net-pcs-airoha-AN7581-add-global-digital-reset-for.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-03-net-airoha-npu-fix-firmware-loading-issue.patch \
            $YYH_RAW/921-net-airoha-npu-fix-firmware-loading-issue.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/patches-6.18/995-04-net-airoha-classify-external-lan-ports-from-DT.patch \
            $YYH_RAW/922-net-airoha-classify-external-lan-ports-from-DT.patch
          curl -sSL --retry 3 --retry-delay 5 -o target/linux/airoha/dts/an7581-xr1710g-ubi.dts \
            https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/dts/an7581-xr1710g-ubi.dts
          curl -sSL --retry 3 --retry-delay 5 -o package/firmware/linux-firmware/airoha.mk \
            https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/package/firmware/linux-firmware/airoha.mk

      - name: Enable bridge flow table kernel config
        run: |
          echo "CONFIG_NF_FLOW_TABLE_BRIDGE=m" >> target/linux/airoha/an7581/config-6.18

      - name: Add XR1710G device definition (YYH2913 authoritative)
        run: |
          cat >> target/linux/airoha/image/an7581.mk << 'XR1710GDEV'

          define Device/econet_xr1710g-ubi
            DEVICE_VENDOR := Econet
            DEVICE_MODEL := XR1710G
            DEVICE_VARIANT := UBI
            DEVICE_DTS := an7581-xr1710g-ubi
            DEVICE_COMPAT_VERSION := 2.0
            DEVICE_COMPAT_MESSAGE := The XR1710G BMT/BBT boundary has changed. Install \
                 an XR1710G chainloader/U-Boot using the new layout first, then boot \
                 recovery/initramfs and fully recreate UBI. A normal sysupgrade that \
                 preserves configuration is unsafe.
            DEVICE_PACKAGES := -airoha-en7581-npu-firmware \
                  -kmod-input-gpio-keys-polled -kmod-leds-pwm \
                  -kmod-pwm-airoha \
                  airoha-en7581-mt7996-npu-firmware \
                  apk-mbedtls ethtool-full fitblk \
                  kmod-i2c-an7581 kmod-hwmon-nct7802 \
                  kmod-mt7996-firmware kmod-phy-realtek rtl826x-firmware \
                  kmod-nf-flow-bridge kmod-nft-offload kmod-nft-fullcone \
                  kmod-nf-flowoffload kmod-nf-flowoffload4 kmod-nf-flowoffload6 \
                  luci \
                  luci-app-firewall luci-app-mlo \
                  luci-app-package-manager \
                  luci-i18n-mlo-zh-cn \
                  luci-mod-admin-full \
                  luci-proto-ppp luci-theme-bootstrap \
                  rpcd-mod-rrdns uhttpd uhttpd-mod-ubus \
                  wpad-basic-mbedtls
            UBINIZE_OPTS := -E 5
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            UBOOTENV_IN_UBI := 1
            KERNEL_IN_UBI := 1
            KERNEL := kernel-bin | gzip
            KERNEL_INITRAMFS := kernel-bin | lzma | \
              fit lzma $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb with-initrd | pad-to 128k
            KERNEL_INITRAMFS_SUFFIX := -recovery.itb
            IMAGES := sysupgrade.itb
            IMAGE/sysupgrade.itb := append-kernel | fit gzip $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb external-static-with-rootfs | append-metadata
            SOC := an7581
          endef
          TARGET_DEVICES += econet_xr1710g-ubi
          XR1710GDEV

      - name: Patch platform.sh for econet,xr1710g-ubi upgrade
        run: |
          awk '
          /^\t\t\*\)/ && !done {
            print "\t\teconet,xr1710g-ubi)"
            print "\t\t\tfit_do_upgrade \"$1\""
            print "\t\t\t;;"
            done=1
          }
          { print }
          ' target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh > /tmp/platform.sh
          mv /tmp/platform.sh target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh
          echo "platform.sh patched for econet,xr1710g-ubi"
          grep -q 'econet,xr1710g-ubi' \
            target/linux/airoha/an7581/base-files/lib/upgrade/platform.sh || exit 1
          echo "platform.sh verified"

      - name: Add YYH2913 uci-defaults
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/14-airoha-hw-flow-offload << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          config_load firewall
          config_get flow_offloading defaults flow_offloading
          config_get flow_offloading_hw defaults flow_offloading_hw
          [ -n "$flow_offloading" ] || uci set firewall.@defaults[0].flow_offloading='1'
          [ -n "$flow_offloading_hw" ] || uci set firewall.@defaults[0].flow_offloading_hw='1'
          uci commit firewall
          exit 0
          EOF
          cat > files/etc/uci-defaults/16-airoha-wifi-tuning << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          . /lib/functions/system.sh
          case "$(board_name)" in
            gemtek,w1700k-ubi|econet,xr1710g-ubi) ;;
            *) exit 0 ;;
          esac
          config_load wireless
          changed=0
          tune_wifi_iface() {
            local cfg="$1" mode
            config_get mode "$cfg" mode
            [ "$mode" = "ap" ] || return 0
            if ! uci -q get wireless."$cfg".uapsd >/dev/null; then
              uci set wireless."$cfg".uapsd='0'; changed=1
            fi
            if ! uci -q get wireless."$cfg".disassoc_low_ack >/dev/null; then
              uci set wireless."$cfg".disassoc_low_ack='0'; changed=1
            fi
          }
          config_foreach tune_wifi_iface wifi-iface
          [ "$changed" -eq 1 ] && uci commit wireless
          exit 0
          EOF
          cat > files/etc/uci-defaults/17-xr1710g-wifi-defaults << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          . /lib/functions/system.sh
          [ "$(board_name)" = "econet,xr1710g-ubi" ] || exit 0
          config_load wireless
          changed=0
          set_xr1710g_radio_defaults() {
            local cfg="$1" band
            config_get band "$cfg" band
            case "$band" in
              2g) uci set wireless."$cfg".country='US' ;;
              5g) uci set wireless."$cfg".country='US'
                uci set wireless."$cfg".channel='36'
                uci set wireless."$cfg".htmode='EHT160' ;;
              6g) uci set wireless."$cfg".country='US'
                uci set wireless."$cfg".channel='37'
                uci set wireless."$cfg".htmode='EHT320' ;;
              *) return 0 ;;
            esac
            changed=1
          }
          config_foreach set_xr1710g_radio_defaults wifi-device
          [ "$changed" -eq 1 ] && uci commit wireless
          exit 0
          EOF
          cat > files/etc/uci-defaults/99-ssh-port << 'SSHCONF'
          #!/bin/sh
          uci set dropbear.@dropbear[0].Port=2242
          uci commit dropbear
          rm -f /etc/uci-defaults/99-ssh-port
          exit 0
          SSHCONF
          chmod +x files/etc/uci-defaults/*

      - name: Add YYH2913 hotplug scripts
        run: |
          mkdir -p files/etc/hotplug.d/net
          cat > files/etc/hotplug.d/net/50-flow-offload-wifi << 'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] || exit 0
          case "$INTERFACE" in
            wl*|phy*|radio*) ;;
            *) exit 0 ;;
          esac
          sleep 2
          /etc/init.d/firewall reload 2>/dev/null
          EOF
          cat > files/etc/hotplug.d/net/50-nf-bridge-call << 'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] || exit 0
          case "$INTERFACE" in
            br-*) ;;
            *) exit 0 ;;
          esac
          /etc/init.d/firewall reload 2>/dev/null
          EOF
          chmod +x files/etc/hotplug.d/net/*

      - name: irqbalance config
        run: |
          mkdir -p files/etc/default
          cat > files/etc/default/irqbalance << 'IRQCONF'
          IRQBALANCE_BANNED_CPUS=
          IRQBALANCE_ARGS="--hintpolicy=subset"
          IRQCONF

      - name: Patch board.d scripts for XR1710G
        run: |
          awk '
          /^\tnokia,valyrian)/ && !done {
            print "\teconet,xr1710g-ubi)"
            print "\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\""
            print "\t\tucidef_set_country \"US\""
            print "\t\tucidef_set_wireless \"2g\" \"XR1710G\""
            print "\t\tucidef_set_wireless \"5g\" \"XR1710G-5G\""
            print "\t\tucidef_set_wireless \"6g\" \"XR1710G-6G\""
            print "\t\tucidef_set_root_password_plain \"password\""
            print "\t\t;;"
            done=1
          }
          { print }
          ' target/linux/airoha/an7581/base-files/etc/board.d/02_network > /tmp/02_network
          mv /tmp/02_network target/linux/airoha/an7581/base-files/etc/board.d/02_network
          grep -q 'econet,xr1710g-ubi)' \
            target/linux/airoha/an7581/base-files/etc/board.d/02_network || exit 1
          echo "02_network: XR1710G interfaces added"
          sed -i 's/^\tgemtek,w1700k-ubi)/\tgemtek,w1700k-ubi|econet,xr1710g-ubi)/' \
            target/linux/airoha/an7581/base-files/etc/board.d/05_compat-version
          grep -q 'gemtek,w1700k-ubi|econet,xr1710g-ubi)' \
            target/linux/airoha/an7581/base-files/etc/board.d/05_compat-version || exit 1
          echo "05_compat-version: XR1710G compat version set"

      - name: Add third-party feeds (${{ matrix.profile }})
        if: matrix.profile != 'lean'
        run: |
          set -ex
          cat $GITHUB_WORKSPACE/builder-configs/configs/feeds/${{ matrix.profile }}.feeds >> feeds.conf.default
          if [ "${{ matrix.profile }}" = "full" ]; then
            git clone --depth 1 https://github.com/linkease/istore.git package/istore
            git clone --depth 1 https://github.com/kongfl888/luci-app-adguardhome.git package/luci-app-adguardhome
          fi

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure firmware
        run: |
          cp "${{ github.workspace }}/builder-configs/configs/${{ matrix.profile }}.config" .config
          make defconfig

      - name: Validate target selection
        run: |
          grep -q 'CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y' .config || {
            echo "FATAL: Target not selected!"
            grep "^CONFIG_TARGET_" .config || true
            exit 1
          }
          echo "Target econet_xr1710g-ubi confirmed"

      - name: Show build config
        run: grep -E "^CONFIG_" .config | sort

      - name: Build firmware (toolchain already compiled)
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Prepare artifacts
        if: always()
        run: |
          mkdir -p release
          cp bin/targets/airoha/an7581/*sysupgrade.itb release/XR1710G-${{ matrix.profile }}-sysupgrade.itb 2>/dev/null || true
          cp bin/targets/airoha/an7581/*recovery.itb release/XR1710G-${{ matrix.profile }}-recovery.itb 2>/dev/null || true
          cp bin/targets/airoha/an7581/config.buildinfo release/XR1710G-${{ matrix.profile }}-config.buildinfo 2>/dev/null || true
          cp build.log release/XR1710G-${{ matrix.profile }}-build.log 2>/dev/null || true
          sha256sum release/XR1710G-*-*sysupgrade.itb > release/XR1710G-${{ matrix.profile }}-sha256sums.txt 2>/dev/null || echo "No .itb found" > release/XR1710G-${{ matrix.profile }}-sha256sums.txt
          ls release/XR1710G-${{ matrix.profile }}-*sysupgrade.itb 1>/dev/null 2>&1 || { echo "FATAL: no .itb produced"; exit 1; }

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.profile }}
          path: release/
          retention-days: 30

  # ── Job 3: Create shared release from all profiles ──
  release:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-all
          pattern: firmware-*
          merge-multiple: true

      - name: Check at least one profile succeeded
        run: |
          if ! ls release-all/*sysupgrade.itb 1>/dev/null 2>&1; then
            echo "FATAL: No profiles produced firmware"
            exit 1
          fi
          echo "Profiles with artifacts:"
          ls release-all/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xr1710g-${{ github.run_number }}
          name: "XR1710G Build ${{ github.run_number }}"
          files: release-all/*
          prerelease: false
