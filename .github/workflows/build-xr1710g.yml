name: Build XR1710G Firmware (Matrix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Build toolchain once for all profiles ──
  toolchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout offload base
        uses: actions/checkout@v4
        with:
          repository: OpenWRT-fanboy/OpenW1700k
          ref: offload
          persist-credentials: false
      - name: Checkout builder configs (XR1710g-Builder)
        uses: actions/checkout@v4
        with:
          path: builder-configs
          persist-credentials: false

      - name: Setup build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget cpio bc ccache libelf-dev quilt

      - name: Cache dl (source tarballs)
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ hashFiles('feeds.conf.default', 'builder-configs/configs/lean.config') }}
          restore-keys: dl-

      - name: Cache ccache (shared across profiles)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-
            ccache-

      - name: Apply XR1710G patches (overclock, YYH2913, device def, board.d)
        uses: ./.github/actions/apply-patches

      - name: Configure firmware (lean baseline for toolchain)
        run: |
          cp ${{ github.workspace }}/builder-configs/configs/lean.config .config
          echo "CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y" >> .config
          make defconfig


      - name: Cache built toolchain (for build jobs)
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: |
            staging_dir/toolchain-*
            staging_dir/host*
            build_dir/toolchain-*
            build_dir/host*
          key: tc-${{ hashFiles('toolchain/**', 'include/toolchain*.mk', 'target/linux/airoha/Makefile') }}

      - name: Build toolchain only
        run: make -j$(nproc) toolchain/compile 2>&1

      - name: Report ccache hit rate
        run: ccache -s 2>&1 | tail -10

  # ── Job 2: Build firmware for each profile ──
  build:
    needs: [toolchain]
    strategy:
      fail-fast: false
      matrix:
        profile: [lean, lite, full]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout offload base
        uses: actions/checkout@v4
        with:
          repository: OpenWRT-fanboy/OpenW1700k
          ref: offload
          persist-credentials: false
      - name: Checkout builder configs (XR1710g-Builder)
        uses: actions/checkout@v4
        with:
          path: builder-configs
          persist-credentials: false

      - name: Setup build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget cpio bc ccache libelf-dev quilt

      - name: Cache dl (source tarballs — shared across profiles)
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ hashFiles('feeds.conf.default', 'builder-configs/configs/lean.config') }}
          restore-keys: dl-

      - name: Restore ccache (shared across profiles)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ hashFiles('target/linux/airoha/an7581/config-6.18') }}-
            ccache-

      - name: Restore toolchain (built once by toolchain job)
        uses: actions/cache@v4
        with:
          path: |
            staging_dir/toolchain-*
            staging_dir/host*
            build_dir/toolchain-*
            build_dir/host*
          key: tc-${{ hashFiles('toolchain/**', 'include/toolchain*.mk', 'target/linux/airoha/Makefile') }}

      - name: Apply XR1710G patches (overclock, YYH2913, device def, board.d)
        uses: ./.github/actions/apply-patches

      - name: Add third-party feeds (${{ matrix.profile }})
        if: matrix.profile != 'lean'
        run: |
          set -ex
          cat $GITHUB_WORKSPACE/builder-configs/configs/feeds/${{ matrix.profile }}.feeds >> feeds.conf.default
          if [ "${{ matrix.profile }}" = "full" ]; then
            git clone --depth 1 https://github.com/linkease/istore.git package/istore
            git clone --depth 1 https://github.com/kongfl888/luci-app-adguardhome.git package/luci-app-adguardhome
          fi

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure firmware
        run: |
          cp "${{ github.workspace }}/builder-configs/configs/${{ matrix.profile }}.config" .config
          make defconfig

      - name: Validate target selection
        run: |
          grep -q 'CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y' .config || {
            echo "FATAL: Target not selected!"
            grep "^CONFIG_TARGET_" .config || true
            exit 1
          }
          echo "Target econet_xr1710g-ubi confirmed"

      - name: Show build config
        run: grep -E "^CONFIG_" .config | sort

      - name: Build firmware (toolchain already compiled)
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Prepare artifacts
        if: always()
        run: |
          mkdir -p release
          cp bin/targets/airoha/an7581/*sysupgrade.itb release/XR1710G-${{ matrix.profile }}-sysupgrade.itb 2>/dev/null || true
          cp bin/targets/airoha/an7581/*recovery.itb release/XR1710G-${{ matrix.profile }}-recovery.itb 2>/dev/null || true
          cp bin/targets/airoha/an7581/config.buildinfo release/XR1710G-${{ matrix.profile }}-config.buildinfo 2>/dev/null || true
          cp build.log release/XR1710G-${{ matrix.profile }}-build.log 2>/dev/null || true
          sha256sum release/XR1710G-*-*sysupgrade.itb > release/XR1710G-${{ matrix.profile }}-sha256sums.txt 2>/dev/null || echo "No .itb found" > release/XR1710G-${{ matrix.profile }}-sha256sums.txt
          ls release/XR1710G-${{ matrix.profile }}-*sysupgrade.itb 1>/dev/null 2>&1 || { echo "FATAL: no .itb produced"; exit 1; }

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.profile }}
          path: release/
          retention-days: 30

  # ── Job 3: Create shared release from all profiles ──
  release:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-all
          pattern: firmware-*
          merge-multiple: true

      - name: Check at least one profile succeeded
        run: |
          if ! ls release-all/*sysupgrade.itb 1>/dev/null 2>&1; then
            echo "FATAL: No profiles produced firmware"
            exit 1
          fi
          echo "Profiles with artifacts:"
          ls release-all/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xr1710g-${{ github.run_number }}
          name: "XR1710G Build ${{ github.run_number }}"
          files: release-all/*
          prerelease: false
