name: Build XR1710G Firmware

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout offload base
        uses: actions/checkout@v4
        with:
          repository: OpenWRT-fanboy/OpenW1700k
          ref: offload

      - name: Setup build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip \
            zlib1g-dev file wget cpio bc ccache libelf-dev quilt

      - name: Apply overclock (+200MHz) and performance governor
        run: |
          set -ex

          # --- 1. config-6.18: switch to performance governor ---
          sed -i \
            -e 's/CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y/# CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND is not set/' \
            -e 's/# CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE is not set/CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y/' \
            target/linux/airoha/an7581/config-6.18

          # --- 2. an7581.dtsi: shift OPP table +200MHz ---
          # Two-phase approach to avoid cascading collisions:
          # Phase 1: Change all opp-hz VALUES using original labels as stable context ranges
          # Phase 2: Change all OPP LABELS (no value collisions since values already changed)

          # PHASE 1: opp-hz values (+200MHz each)
          sed -i '/opp-500000000 {/,/};/s/<500000000>/<700000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-550000000 {/,/};/s/<550000000>/<750000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-600000000 {/,/};/s/<600000000>/<800000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-650000000 {/,/};/s/<650000000>/<850000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7000000000 {/,/};/s/<700000000>/<900000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-7500000000 {/,/};/s/<750000000>/<950000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8000000000 {/,/};/s/<800000000>/<1000000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-8500000000 {/,/};/s/<850000000>/<1050000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9000000000 {/,/};/s/<900000000>/<1100000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-9500000000 {/,/};/s/<950000000>/<1150000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10000000000 {/,/};/s/<1000000000>/<1200000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-10500000000 {/,/};/s/<1050000000>/<1250000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11000000000 {/,/};/s/<1100000000>/<1300000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-11500000000 {/,/};/s/<1150000000>/<1350000000>/' target/linux/airoha/dts/an7581.dtsi
          sed -i '/opp-12000000000 {/,/};/s/<1200000000>/<1400000000>/' target/linux/airoha/dts/an7581.dtsi

          # PHASE 2: OPP labels (+200MHz each) — REVERSE order to avoid cascading collisions
          # (e.g. entry 7: opp-8000000000→opp-10000000000 would collide with original entry 11
          #  unless entry 11 is already renamed → renaming from high-to-low avoids this.)
          sed -i 's/opp-12000000000 {/opp-14000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11500000000 {/opp-13500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-11000000000 {/opp-13000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10500000000 {/opp-12500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-10000000000 {/opp-12000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9500000000 {/opp-11500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-9000000000 {/opp-11000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8500000000 {/opp-10500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-8000000000 {/opp-10000000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7500000000 {/opp-9500000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-7000000000 {/opp-9000000000 {/' target/linux/airoha/dts/an7581.dtsi
          # Entries 1-4 have 9-digit labels with no overlap with 10-digit ones above
          sed -i 's/opp-650000000 {/opp-850000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-600000000 {/opp-800000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-550000000 {/opp-750000000 {/' target/linux/airoha/dts/an7581.dtsi
          sed -i 's/opp-500000000 {/opp-700000000 {/' target/linux/airoha/dts/an7581.dtsi

          # --- 3. 940-pmdomain patch: bump base freq 500→700 ---
          sed -i 's/unsigned int freq_mhz = 500 + state \* 50;/unsigned int freq_mhz = 700 + state * 50;/' \
            target/linux/airoha/patches-6.18/940-pmdomain-airoha-Add-Airoha-CPU-PM-Domain-support.patch

          echo "Overclock +200MHz applied"

      - name: Apply YYH2913 XR1710G patches and DTS
        run: |
          set -ex
          YYH_RAW="https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/patches-6.18"
          curl -sSLO --output-dir target/linux/airoha/patches-6.18/ $YYH_RAW/620-net-pcs-airoha-fix-USXGMII-rate-adaptation-on-speed.patch
          curl -sSLO --output-dir target/linux/airoha/patches-6.18/ $YYH_RAW/621-net-pcs-airoha-AN7581-add-global-digital-reset-for.patch
          curl -sSLO --output-dir target/linux/airoha/patches-6.18/ $YYH_RAW/921-net-airoha-npu-fix-firmware-loading-issue.patch
          curl -sSLO --output-dir target/linux/airoha/patches-6.18/ $YYH_RAW/922-net-airoha-classify-external-lan-ports-from-DT.patch
          curl -sSLO --output-dir target/linux/airoha/patches-6.18/ $YYH_RAW/9990-net-airoha-bind-WLAN-bound-flows-on-PPE-driver-L2-cache-miss.patch
          curl -sSL -o target/linux/airoha/dts/an7581-xr1710g-ubi.dts \
            https://raw.githubusercontent.com/YYH2913/openwrt/xr1710g-6.18-integration/target/linux/airoha/dts/an7581-xr1710g-ubi.dts

      - name: Enable bridge flow table kernel config
        run: |
          echo "CONFIG_NF_FLOW_TABLE_BRIDGE=m" >> target/linux/airoha/an7581/config-6.18

      - name: Add XR1710G device definition
        run: |
          cat >> target/linux/airoha/image/an7581.mk << 'XR1710GDEV'

          define Device/gemtek_xr1710g-ubi
            DEVICE_VENDOR := Gemtek
            DEVICE_MODEL := XR1710G
            DEVICE_VARIANT := UBI
            DEVICE_ALT0_VENDOR := Brightspeed
            DEVICE_ALT0_MODEL := XR1710G
            DEVICE_ALT0_VARIANT := UBI
            DEVICE_DTS := an7581-xr1710g-ubi
            DEVICE_COMPAT_VERSION := 2.0
            DEVICE_COMPAT_MESSAGE := UBI v2 layout with BMT reserved area. \
              Chainloader must be UBI 2.0 capable (YYH2913/http-uboot v2026.07+).
            DEVICE_PACKAGES := airoha-en7581-mt7996-npu-firmware fitblk kmod-i2c-an7581 \
              kmod-hwmon-nct7802 kmod-mt7996-firmware wpad-mbedtls rtl826x-firmware \
              kmod-phy-rtl8261ce kmod-nft-offload kmod-nft-fullcone kmod-crypto-hw-eip93 \
              kmod-nf-flow-bridge \
              luci-app-airoha-npu luci-app-airoha-flowsense luci-app-w1700k-fancontrol \
              luci-app-mlo luci-app-netspeedtest luci-app-wifi7 \
              luci-app-ttyd luci-app-firewall luci-app-upnp luci-app-wol luci-app-ddns \
              luci-app-openclash luci-app-passwall luci-app-zerotier \
              luci-app-adguardhome luci-app-smartdns \
              luci-app-banip luci-app-udpxy luci-app-msd_lite luci-app-watchcat \
              luci-theme-bootstrap luci-theme-argon luci-app-argon-config \
              dnsmasq-full firewall4 nftables bash coreutils htop iperf3 tcpdump curl jq nano \
              ethtool-full sing-box xray-core shadowsocks-rust-sslocal haproxy smartdns \
              luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
              luci-app-store istore
            UBINIZE_OPTS := -E 5
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            UBOOTENV_IN_UBI := 1
            KERNEL_IN_UBI := 1
            KERNEL := kernel-bin | gzip
            KERNEL_INITRAMFS := kernel-bin | lzma | \
              fit lzma $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb with-initrd | pad-to 128k
            KERNEL_INITRAMFS_SUFFIX := -recovery.itb
            IMAGES := sysupgrade.itb
            IMAGE/sysupgrade.itb := append-kernel | fit gzip $$(KDIR)/image-$$(firstword $$(DEVICE_DTS)).dtb external-static-with-rootfs | append-metadata
            SOC := an7581
          endef
          TARGET_DEVICES += gemtek_xr1710g-ubi
          XR1710GDEV

      - name: Setup custom files (uci-defaults for SSH port etc.)
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-ssh-port << 'SSHCONF'
          #!/bin/sh
          # Set SSH port to 2242 for non-STB users
          uci set dropbear.@dropbear[0].Port=2242
          uci commit dropbear
          rm -f /etc/uci-defaults/99-ssh-port
          exit 0
          SSHCONF
          chmod +x files/etc/uci-defaults/99-ssh-port

          # irqbalance config for AN7581
          mkdir -p files/etc/default
          cat > files/etc/default/irqbalance << 'IRQCONF'
          # AN7581-specific IRQ balancing
          IRQBALANCE_BANNED_CPUS=
          IRQBALANCE_ARGS="--hintpolicy=subset"
          IRQCONF

      - name: Add third-party feeds
        run: |
          set -ex
          cat >> feeds.conf.default << 'EOF'
          src-git openclash https://github.com/vernesong/OpenClash.git;master
          src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          src-git passwall_pkg https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git istore https://github.com/linkease/istore.git;main
          EOF

          git clone --depth 1 https://github.com/pymumu/openwrt-smartdns.git package/smartdns
          git clone --depth 1 https://github.com/pymumu/luci-app-smartdns.git package/luci-app-smartdns
          git clone --depth 1 https://github.com/kongfl888/luci-app-adguardhome.git package/luci-app-adguardhome
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config
          git clone --depth 1 https://github.com/linkease/istore.git package/istore
          # luci-app-store is inside istore repo at luci/luci-app-store
          ln -sf ../istore/luci/luci-app-store package/luci-app-store

          # Gate smartdns webui download behind CONFIG_PACKAGE_smartdns-ui guard
          sed -i 's/\$(eval \$(call Download,smartdns-webui))/ifdef CONFIG_PACKAGE_smartdns-ui\n\$(eval \$(call Download,smartdns-webui))\nendif/' package/smartdns/Makefile

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure firmware
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_airoha_an7581=y
          CONFIG_TARGET_airoha_an7581_DEVICE_gemtek_xr1710g-ubi=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_KERNEL_DEVMEM=y
          CONFIG_BUSYBOX_CUSTOM=y
          CONFIG_BUSYBOX_CONFIG_DEVMEM=y
          CONFIG_LIBCURL_COOKIES=y
          CONFIG_LIBCURL_FILE=y
          CONFIG_LIBCURL_HTTP=y
          CONFIG_LIBCURL_HTTP2=y
          CONFIG_LIBCURL_MBEDTLS=y
          CONFIG_LIBCURL_PROXY=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_sqm-scripts-extra=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-nf-flowoffload=y
          CONFIG_PACKAGE_kmod-nf-flowoffload4=y
          CONFIG_PACKAGE_kmod-nf-flowoffload6=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_DROPBEAR_2242=n
          EOF
          make defconfig

      - name: Show build config
        run: grep -E "^CONFIG_" .config | sort

      - name: Build firmware
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Prepare artifacts
        if: always()
        run: |
          mkdir -p release
          cp bin/targets/airoha/an7581/*sysupgrade.itb release/ 2>/dev/null || true
          cp bin/targets/airoha/an7581/config.buildinfo release/ 2>/dev/null || true
          cp build.log release/ 2>/dev/null || true
          sha256sum release/*.itb > release/sha256sums.txt 2>/dev/null || echo "No .itb found" > release/sha256sums.txt

      - name: Upload firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: XR1710G-ImmortalWrt-offload
          path: release/
          retention-days: 30

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xr1710g-${{ github.run_number }}
          name: "XR1710G Build ${{ github.run_number }}"
          files: release/*
          prerelease: false
